version: "3.9"

services:
  db:
    image: postgres:16
    container_name: mercadoagil_db
    # ... environment, ports, volumes
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mercadoagil"]
      interval: 2s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    environment:
      POSTGRES_USER: mercadoagil
      POSTGRES_PASSWORD: mercadoagil
      POSTGRES_DB: mercadoagil
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: mercadoagil_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "3000:3000"
    command: npm run dev
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  db_data:

